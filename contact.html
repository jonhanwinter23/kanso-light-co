<!DOCTYPE html>
<html lang="km" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KANSŌ Light Co. | Contact</title>
  <script src="assets/js/tailwind-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body data-page="contact" class="bg-kanso-bg text-kanso-dark min-h-screen flex flex-col antialiased">

  <div id="site-banner"></div>
  <div id="site-header"></div>

  <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <div class="max-w-2xl">
      <span class="text-xs font-bold uppercase tracking-widest text-kanso-terracotta" id="contactSub"></span>
      <h1 class="text-2xl sm:text-4xl font-light mt-2 mb-4" id="contactTitle"></h1>
      <p class="text-kanso-muted text-sm leading-relaxed mb-10" id="contactDesc"></p>
    </div>

    <div class="grid md:grid-cols-2 gap-8">
      <div class="bg-kanso-card border border-kanso-border rounded-2xl p-8 space-y-4">
        <h2 class="font-semibold text-lg">Telegram</h2>
        <p class="text-sm text-kanso-muted">Fastest way to order and ask about stock in Phnom Penh.</p>
        <a href="https://t.me/+85566599288" target="_blank" rel="noopener noreferrer" class="inline-flex bg-sky-600 hover:bg-sky-500 text-white text-sm font-semibold py-3 px-6 rounded-xl transition">Message on Telegram</a>
      </div>
      <div class="bg-kanso-card border border-kanso-border rounded-2xl p-8 space-y-4">
        <h2 class="font-semibold text-lg">Instagram</h2>
        <p class="text-sm text-kanso-muted">See new arrivals and room styling ideas.</p>
        <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="inline-flex bg-kanso-dark hover:bg-kanso-terracotta text-white text-sm font-semibold py-3 px-6 rounded-xl transition">@kansolightco</a>
      </div>
    </div>

    <div class="mt-12 grid sm:grid-cols-3 gap-6 text-sm">
      <div class="p-5 rounded-xl border border-kanso-border bg-white/50">
        <p class="font-semibold mb-1" id="badge1Title"></p>
        <p class="text-xs text-kanso-muted" id="badge1Desc"></p>
      </div>
      <div class="p-5 rounded-xl border border-kanso-border bg-white/50">
        <p class="font-semibold mb-1" id="badge2Title"></p>
        <p class="text-xs text-kanso-muted" id="badge2Desc"></p>
      </div>
      <div class="p-5 rounded-xl border border-kanso-border bg-white/50">
        <p class="font-semibold mb-1" id="badge4Title"></p>
        <p class="text-xs text-kanso-muted" id="badge4Desc"></p>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <div id="site-overlays"></div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/products.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/state.js"></script>
  <script src="assets/js/language.js"></script>
  <script src="assets/js/catalog.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/checkout.js"></script>
  <script src="assets/js/ui-modals.js"></script>
  <script src="assets/js/ambient.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
